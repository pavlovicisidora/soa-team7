syntax = "proto3";

option go_package = "github.com/pavlovicisidora/soa-team7/Backend/APIGateway/proto";

import "google/protobuf/timestamp.proto";

option java_multiple_files = true;
option java_outer_classname = "TourProto";
option java_package = "com.example.tour.grpc";

package tour;

service TourGrpcService {
  rpc CreateTour(CreateTourRequest) returns (CreateTourResponse);
  rpc GetAllToursById(GetAllToursByIdRequest) returns (GetAllToursByIdResponse);
  rpc GetAllTours(GetAllToursRequest) returns (GetAllToursResponse);
  rpc GetTourById(GetTourByIdRequest) returns (GetTourByIdResponse);
  
  rpc StartTour(StartTourRequest) returns (StartTourResponse);
  rpc AbandonTour(AbandonTourRequest) returns (AbandonTourResponse);
  rpc CompleteKeyPoint(CompleteKeyPointRequest) returns (CompleteKeyPointResponse);
  rpc GetTourExecution(GetTourExecutionRequest) returns (GetTourExecutionResponse);
}

message Tour {
  int32 id = 1;
  string name = 2;
  string description = 3;
  string difficulty = 4;
  repeated string tags = 5;
  string status = 6;
  double price = 7;
  string author_id = 8;
}

message CreateTourRequest {
  string name = 1;
  string description = 2;
  string difficulty = 3;
  repeated string tags = 4;
  string author_id = 5;
}
message CreateTourResponse{
  Tour tour = 1;
}
message GetAllToursByIdRequest{
  string author_id = 1;
}
message GetAllToursByIdResponse{
  repeated Tour tours = 1;
}

message GetAllToursRequest{}
message GetAllToursResponse{
  repeated Tour tours = 1;
}
message GetTourByIdRequest{
  int32 tour_id = 1;
}
message GetTourByIdResponse{
  Tour tour = 1;
}


message TourExecution {
  int32 id = 1;
  int32 tour_id = 2;
  string tourist_id = 3;
  string status = 4;
  google.protobuf.Timestamp start_time = 5;
  google.protobuf.Timestamp last_activity = 6;
  google.protobuf.Timestamp completion_time = 7; 
}

message StartTourRequest {
  int32 tour_id = 1;
  string tourist_id = 2;
  double latitude = 3;
  double longitude = 4;
}

message StartTourResponse {
  TourExecution tour_execution = 1;
}

message AbandonTourRequest {
  int32 tour_execution_id = 1;
}

message AbandonTourResponse {
  TourExecution tour_execution = 1;
}

message CompleteKeyPointRequest{
  int32 tour_execution_id = 1;
  int32 keypoint_execution_id = 2;
}

message CompleteKeyPointResponse {
  TourExecution tour_execution = 1;
}


message GetTourExecutionRequest {
  int32 tour_execution_id = 1;
}

message GetTourExecutionResponse {
  TourExecution tour_execution = 1;
  Tour tour = 2; 
}

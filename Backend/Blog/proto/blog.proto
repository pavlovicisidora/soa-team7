syntax = "proto3";

import "google/protobuf/timestamp.proto";

option go_package = "github.com/pavlovicisidora/soa-team7/Backend/Blog/proto";

package blog;

service BlogService {
  rpc CreateBlog(CreateBlogRequest) returns (CreateBlogResponse) {}
  rpc GetBlog(GetBlogRequest) returns (GetBlogResponse) {}
  rpc GetAllBlogs(GetAllBlogsRequest) returns (GetAllBlogsResponse) {}
  rpc LikeBlog(LikeBlogRequest) returns (LikeBlogResponse) {}
  rpc UnlikeBlog(UnlikeBlogRequest) returns (UnlikeBlogResponse) {}
}

message Image {
    string url = 1;
}

message Blog {
  string id = 1;
  string title = 2;
  string content = 3;
  google.protobuf.Timestamp created_at = 4;
  string user_id = 5;
  repeated Image images = 6;
  int32 like_count = 7;
}

message CreateBlogRequest {
  string title = 1;
  string content = 2;
  string user_id = 3;
  repeated Image images = 4; 
}
message CreateBlogResponse {
  Blog blog = 1;
}

message GetBlogRequest {
  string id = 1;
}
message GetBlogResponse {
  Blog blog = 1;
}

message GetAllBlogsRequest {}
message GetAllBlogsResponse {
  repeated Blog blogs = 1;
}

message LikeBlogRequest {
  string blog_id = 1;
  string user_id = 2;
}
message LikeBlogResponse {
  Blog blog = 1;
}

message UnlikeBlogRequest {
  string blog_id = 1;
  string user_id = 2;
}
message UnlikeBlogResponse {
  Blog blog = 1;
}
